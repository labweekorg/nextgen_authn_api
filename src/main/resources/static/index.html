<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIDO2 WebAuthn - Passkey / Biometric Test</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        h1 { color: #333; }
        .section { background: #f5f5f5; padding: 20px; border-radius: 8px; margin: 20px 0; }
        input { padding: 10px; width: 100%; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { padding: 12px 24px; margin: 5px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; color: white; }
        .btn-register { background: #007bff; }
        .btn-login { background: #28a745; }
        .btn-passkey { background: #6f42c1; }
        button:hover { opacity: 0.9; }
        #log { background: #1e1e1e; color: #0f0; padding: 15px; border-radius: 4px; font-family: monospace; font-size: 13px; white-space: pre-wrap; max-height: 400px; overflow-y: auto; margin-top: 20px; }
        .label { font-weight: bold; margin-top: 10px; display: block; }
    </style>
</head>
<body>
    <h1>🔐 FIDO2 WebAuthn Test</h1>
    <p>Test biometric (fingerprint/Face ID), passkey, and security key authentication</p>

    <div class="section">
        <h2>Register</h2>
        <span class="label">Username:</span>
        <input type="text" id="regUsername" placeholder="e.g. initha_sharavanan" value="initha_sharavanan">
        <span class="label">Display Name:</span>
        <input type="text" id="regDisplayName" placeholder="e.g. Initha Sharavanan" value="Initha Sharavanan">
        <br><br>
        <button class="btn-register" onclick="register(true)">🖐 Register Laptop Biometric</button>
    </div>

    <div class="section">
        <h2>Login</h2>
        <span class="label">Username:</span>
        <input type="text" id="loginUsername" placeholder="e.g. initha_sharavanan" value="initha_sharavanan">
        <br><br>
        <button class="btn-login" onclick="login()">🖐 Login with Biometric</button>
        <button class="btn-passkey" onclick="loginPasskey()">🔑 Login with Passkey (no username)</button>
    </div>

    <h3>Log:</h3>
    <div id="log">Ready. Click a button above to start.</div>

    <script>
        const API = 'http://localhost:8080/webauthn';

        function log(msg) {
            const el = document.getElementById('log');
            el.textContent += '\n' + msg;
            el.scrollTop = el.scrollHeight;
        }

        function clearLog() {
            document.getElementById('log').textContent = '';
        }

        // ─── Base64URL helpers ───
        function base64urlToBytes(base64url) {
            const base64 = base64url.replace(/-/g, '+').replace(/_/g, '/');
            const pad = base64.length % 4 === 0 ? '' : '='.repeat(4 - (base64.length % 4));
            const binary = atob(base64 + pad);
            return Uint8Array.from(binary, c => c.charCodeAt(0));
        }

        function bytesToBase64url(bytes) {
            const binary = String.fromCharCode(...new Uint8Array(bytes));
            return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        }

        // ═══════════════════════════════════════════
        // REGISTRATION
        // ═══════════════════════════════════════════
        async function register(biometric) {
            clearLog();
            const username = document.getElementById('regUsername').value;
            const displayName = document.getElementById('regDisplayName').value;

            try {
                // Step 1: Get registration options from server
                log('📡 Step 1: Requesting registration options...');
                const optionsRes = await fetch(API + '/register/options', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, displayName, biometric })
                });
                const options = await optionsRes.json();
                log('✅ Server returned challenge: ' + options.challenge);
                log('   RP: ' + options.rp.name + ' (' + options.rp.id + ')');
                log('   Authenticator: ' + options.authenticatorSelection.authenticatorAttachment);

                // Step 2: Call WebAuthn browser API — this triggers biometric prompt!
                log('\n🖐 Step 2: Triggering biometric prompt...');
                log('   (Scan your fingerprint / Face ID / use passkey now)');

                const createOptions = {
                    publicKey: {
                        challenge: base64urlToBytes(options.challenge),
                        rp: options.rp,
                        user: {
                            id: base64urlToBytes(options.user.id),
                            name: options.user.name,
                            displayName: options.user.displayName
                        },
                        pubKeyCredParams: options.pubKeyCredParams,
                        authenticatorSelection: options.authenticatorSelection,
                        timeout: options.timeout,
                        attestation: options.attestation
                    }
                };

                // Add excludeCredentials if present
                if (options.excludeCredentials) {
                    createOptions.publicKey.excludeCredentials = options.excludeCredentials.map(c => ({
                        type: c.type,
                        id: base64urlToBytes(c.id)
                    }));
                }

                // THIS triggers Face ID / fingerprint / passkey creation!
                const credential = await navigator.credentials.create(createOptions);

                log('✅ Device created key pair!');
                log('   Credential ID: ' + bytesToBase64url(credential.rawId));
                log('   🔒 Private key: stored on YOUR device (never leaves)');
                log('   🔑 Public key: being sent to server now...');

                // Step 3: Send the credential to server for verification
                log('\n📡 Step 3: Sending public key to server...');
                const verifyRes = await fetch(API + '/register/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: bytesToBase64url(credential.rawId),
                        rawId: bytesToBase64url(credential.rawId),
                        type: credential.type,
                        username: username,
                        response: {
                            clientDataJSON: bytesToBase64url(credential.response.clientDataJSON),
                            attestationObject: bytesToBase64url(credential.response.attestationObject)
                        }
                    })
                });
                const result = await verifyRes.json();

                if (result.status === 'ok') {
                    log('\n🎉 REGISTRATION SUCCESSFUL!');
                    log('   Username: ' + result.username);
                    log('   Credential ID: ' + result.credentialId);
                    log('   Authenticator: ' + result.authenticatorType);
                    log('   AAGUID: ' + result.aaguid);
                    log('\n   ✅ Public key stored in MySQL credentials table');
                    log('   ✅ Private key stored on your device');
                } else {
                    log('\n❌ Registration failed: ' + result.message);
                }

            } catch (err) {
                log('\n❌ Error: ' + err.message);
                if (err.name === 'NotAllowedError') {
                    log('   User cancelled the biometric prompt');
                }
            }
        }

        // ═══════════════════════════════════════════
        // LOGIN (with username)
        // ═══════════════════════════════════════════
        async function login() {
            clearLog();
            const username = document.getElementById('loginUsername').value;

            try {
                // Step 1: Get login options
                log('📡 Step 1: Requesting login options...');
                const optionsRes = await fetch(API + '/login/options', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });
                const options = await optionsRes.json();

                if (options.status === 'error') {
                    log('❌ ' + options.message);
                    return;
                }

                log('✅ Server returned challenge: ' + options.challenge);
                log('   Allowed credentials: ' + options.allowCredentials.length);

                // Step 2: Call WebAuthn browser API — triggers biometric!
                log('\n🖐 Step 2: Triggering biometric prompt...');
                log('   (Scan your fingerprint / Face ID now)');

                const getOptions = {
                    publicKey: {
                        challenge: base64urlToBytes(options.challenge),
                        rpId: options.rpId,
                        allowCredentials: options.allowCredentials.map(c => ({
                            type: c.type,
                            id: base64urlToBytes(c.id),
                            transports: c.transports
                        })),
                        userVerification: options.userVerification,
                        timeout: options.timeout
                    }
                };

                // THIS triggers Face ID / fingerprint verification!
                const assertion = await navigator.credentials.get(getOptions);

                log('✅ Device signed the challenge with private key!');

                // Step 3: Send the assertion to server
                log('\n📡 Step 3: Sending signature to server for verification...');
                const verifyRes = await fetch(API + '/login/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: bytesToBase64url(assertion.rawId),
                        rawId: bytesToBase64url(assertion.rawId),
                        type: assertion.type,
                        response: {
                            clientDataJSON: bytesToBase64url(assertion.response.clientDataJSON),
                            authenticatorData: bytesToBase64url(assertion.response.authenticatorData),
                            signature: bytesToBase64url(assertion.response.signature),
                            userHandle: assertion.response.userHandle
                                ? bytesToBase64url(assertion.response.userHandle)
                                : null
                        }
                    })
                });
                const result = await verifyRes.json();

                if (result.status === 'ok') {
                    log('\n🎉 LOGIN SUCCESSFUL!');
                    log('   Username: ' + result.username);
                    log('   Display Name: ' + result.displayName);
                    log('   Authenticator: ' + result.authenticatorType);
                    log('\n   ✅ Server verified signature using stored public key');
                } else {
                    log('\n❌ Login failed: ' + result.message);
                }

            } catch (err) {
                log('\n❌ Error: ' + err.message);
                if (err.name === 'NotAllowedError') {
                    log('   User cancelled the biometric prompt');
                }
            }
        }

        // ═══════════════════════════════════════════
        // LOGIN (passkey — no username)
        // ═══════════════════════════════════════════
        async function loginPasskey() {
            clearLog();

            try {
                log('📡 Step 1: Requesting passkey login options (no username)...');
                const optionsRes = await fetch(API + '/login/options', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                const options = await optionsRes.json();
                log('✅ Server returned challenge: ' + options.challenge);

                log('\n🔑 Step 2: Triggering passkey discovery...');
                log('   (Your device will show available passkeys)');

                const getOptions = {
                    publicKey: {
                        challenge: base64urlToBytes(options.challenge),
                        rpId: options.rpId,
                        userVerification: options.userVerification,
                        timeout: options.timeout
                    }
                };

                const assertion = await navigator.credentials.get(getOptions);

                log('✅ Passkey selected and signed!');

                log('\n📡 Step 3: Sending signature to server...');
                const verifyRes = await fetch(API + '/login/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: bytesToBase64url(assertion.rawId),
                        rawId: bytesToBase64url(assertion.rawId),
                        type: assertion.type,
                        response: {
                            clientDataJSON: bytesToBase64url(assertion.response.clientDataJSON),
                            authenticatorData: bytesToBase64url(assertion.response.authenticatorData),
                            signature: bytesToBase64url(assertion.response.signature),
                            userHandle: assertion.response.userHandle
                                ? bytesToBase64url(assertion.response.userHandle)
                                : null
                        }
                    })
                });
                const result = await verifyRes.json();

                if (result.status === 'ok') {
                    log('\n🎉 PASSKEY LOGIN SUCCESSFUL!');
                    log('   Username: ' + result.username);
                    log('   Display Name: ' + result.displayName);
                    log('   Authenticator: ' + result.authenticatorType);
                } else {
                    log('\n❌ Login failed: ' + result.message);
                }

            } catch (err) {
                log('\n❌ Error: ' + err.message);
            }
        }
    </script>
</body>
</html>
