spring:
  datasource:
    url: jdbc:h2:mem:webauthn_db;DB_CLOSE_DELAY=-1;MODE=MYSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
server:
  port: 8080
webauth:
  rp-id: localhost
  rp-name: Authentication
  origin: http://localhost:4200
